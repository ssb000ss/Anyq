services:
  anyq-api:
    build: .
    container_name: anyq-api
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      SEARXNG_URL: http://searxng:8080
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./frontend:/app/frontend:ro
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - anyq-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: anyq-redis
    command: >
      redis-server
      --save 60 1
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - anyq-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 600m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  searxng:
    image: searxng/searxng:latest
    container_name: anyq-searxng
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
      SEARXNG_SECRET_KEY: "${SEARXNG_SECRET_KEY}"
    volumes:
      # Mount config files individually (not :ro on dir — SearXNG needs to write uwsgi.ini)
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./docker/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
      - searxng-data:/etc/searxng
    networks:
      - anyq-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  tor-1:
    build:
      context: ./docker/tor
      dockerfile: Dockerfile
    container_name: anyq-tor-1
    networks:
      - anyq-net
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/9050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  tor-2:
    build:
      context: ./docker/tor
      dockerfile: Dockerfile
    container_name: anyq-tor-2
    networks:
      - anyq-net
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/9050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  tor-3:
    build:
      context: ./docker/tor
      dockerfile: Dockerfile
    container_name: anyq-tor-3
    networks:
      - anyq-net
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/9050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  redis-data:
  searxng-data:

networks:
  anyq-net:
    driver: bridge
