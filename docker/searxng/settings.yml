use_default_settings: true

general:
  instance_name: "anyq"
  donation_url: false
  contact_url: false

search:
  formats:
    - html
    - json
  safe_search: 0
  autocomplete: ""
  default_lang: "ru-RU"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "__SEARXNG_SECRET_KEY__"
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  default_locale: "ru"
  query_in_title: false
  infinite_scroll: false
  default_theme: simple

engines:
  - name: google
    disabled: false

  - name: bing
    disabled: false

  - name: duckduckgo
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: google scholar
    engine: google_scholar
    shortcut: gsc
    disabled: false

  - name: wikipedia
    disabled: true

  - name: wikidata
    disabled: true

  - name: wikimini
    disabled: true

  - name: wikibooks
    disabled: true

  - name: wikiquote
    disabled: true

  - name: wikinews
    disabled: true

  - name: wikiversity
    disabled: true

  - name: wikispecies
    disabled: true

  - name: wikivoyage
    disabled: true

outgoing:
  request_timeout: 15.0
  max_request_timeout: 30.0
  pool_connections: 100
  pool_maxsize: 20
  # Route all outgoing search requests through Tor for IP rotation.
  # Each Tor instance provides a different circuit (exit node).
  proxies:
    all://:
      - socks5h://tor-1:9050
      - socks5h://tor-2:9050
      - socks5h://tor-3:9050
